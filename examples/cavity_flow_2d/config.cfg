# Configuration file for 2D lid-driven cavity flow
# CFD Solver with CUDA v0.1.0-alpha

[Simulation]
# Simulation type and dimensions
dimension = 2
solver_type = finite_volume
time_scheme = runge_kutta_4

# Time stepping parameters
max_iterations = 10000
time_step = 1e-4
convergence_tolerance = 1e-6

[Domain]
# Grid dimensions
nx = 128
ny = 128
nz = 1

# Physical domain size (meters)
length_x = 1.0
length_y = 1.0
length_z = 0.1

# Grid spacing (calculated automatically if not specified)
# dx = length_x / nx
# dy = length_y / ny
# dz = length_z / nz

[Physics]
# Fluid properties
density = 1.0           # kg/m³
viscosity = 0.001       # Pa·s (Re = 1000)
specific_heat = 1005.0  # J/(kg·K)
thermal_conductivity = 0.0262  # W/(m·K)

# Non-dimensional parameters
reynolds_number = 1000
mach_number = 0.1

[BoundaryConditions]
# Boundary condition types:
# 0 = Dirichlet (fixed value)
# 1 = Neumann (fixed gradient)
# 2 = Periodic

# Left wall (x = 0)
left_type = 0
left_u = 0.0
left_v = 0.0
left_p = 0.0

# Right wall (x = length_x)
right_type = 0
right_u = 0.0
right_v = 0.0
right_p = 0.0

# Bottom wall (y = 0)
bottom_type = 0
bottom_u = 0.0
bottom_v = 0.0
bottom_p = 0.0

# Top wall (y = length_y) - moving lid
top_type = 0
top_u = 1.0     # Moving lid velocity
top_v = 0.0
top_p = 0.0

[InitialConditions]
# Initial field values
initial_u = 0.0
initial_v = 0.0
initial_p = 0.0
initial_temperature = 293.15  # K

[Output]
# Output settings
output_directory = output/cavity_flow_2d/
output_format = vtk
output_frequency = 100    # Every 100 time steps
save_residuals = true
save_intermediate = true

# Fields to save
save_velocity = true
save_pressure = true
save_temperature = false
save_vorticity = true

[Solver]
# Pressure-velocity coupling
pressure_velocity_coupling = SIMPLE
pressure_iterations = 50
momentum_iterations = 5

# Linear solver settings
linear_solver = jacobi
max_linear_iterations = 1000
linear_tolerance = 1e-8

# Relaxation factors
velocity_relaxation = 0.7
pressure_relaxation = 0.3

[CUDA]
# CUDA-specific settings
device_id = 0
thread_block_size = 256
shared_memory_size = 48000  # bytes

# Memory management
use_managed_memory = false
memory_pool_size = 1024     # MB

# Optimization flags
use_texture_memory = false
use_constant_memory = true